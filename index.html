<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Calculadora y Previsualizador de Logotipos AR</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- MindAR para A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Interfaz de Usuario -->
    <div id="ui-container">
        <!-- Calculadora de Tamaño -->
        <div class="glass-panel top-panel">
            <h1>Tamaño de Fabricación</h1>
            <p id="size-label">20.0 cm Ancho x 20.0 cm Alto</p>
            <label for="marker-size" style="font-size: 0.75rem; opacity: 0.8; margin-top: 8px; display:block;">Tamaño de tu hoja impresa:</label>
            <select id="marker-size" style="margin-top: 4px; border-radius: 8px; padding: 6px; background: rgba(0,0,0,0.4); color: #34D399; font-weight:bolder; font-size:0.8rem; border: 1px solid rgba(255,255,255,0.2); outline: none; cursor: pointer;">
                <option value="20">20x20 cm (Hoja Carta regular)</option>
                <option value="30">30x30 cm (Tabloide / Plóter)</option>
                <option value="10">10x10 cm (Tarjeta pequeña)</option>
            </select>
        </div>

        <!-- Botón para subir logo -->
        <label for="logo-upload" class="upload-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Subir Logo (.png)
        </label>
        <input type="file" id="logo-upload" accept="image/png">

        <!-- Controles de Escala -->
        <div class="glass-panel bottom-panel">
            <label for="scale-slider">Escala Proyectada (Proporción)</label>
            <input type="range" id="scale-slider" min="0.5" max="10" step="0.1" value="1">
        </div>
    </div>

    <!-- Escena AR -->
    <!-- Nota: Coloca el archivo targets.mind generado en esta misma carpeta -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <!-- Target tracker -->
        <a-entity mindar-image-target="targetIndex: 0">
            <!-- Contenedor del Logo (Aquí se aplica la escala) -->
            <a-entity id="logo-wrapper" scale="1 1 1">
                <!-- Por defecto mostramos un plano con color, luego se reemplazará por la imagen -->
                <a-plane id="logo-plane" width="1" height="1" color="#4F46E5" opacity="0.8" position="0 0 0.1"></a-plane>
            </a-entity>
        </a-entity>
    </a-scene>

    <script src="app.js"></script>
</body>
</html>
