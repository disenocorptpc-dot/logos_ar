<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Calculadora y Previsualizador de Logotipos AR</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- MindAR para A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Overlay de Contraseña -->
    <div id="password-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:sans-serif;">
        <h2 style="margin-bottom: 20px;">Acceso Restringido</h2>
        <input type="password" id="site-password" placeholder="Contraseña" style="padding:12px;border-radius:8px;border:none;outline:none;width:250px;text-align:center;font-size:16px;">
        <button onclick="checkPassword()" style="margin-top:15px;padding:12px 24px;background:#4F46E5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px;font-weight:bold;">Entrar</button>
        <p id="password-error" style="color:#ef4444;margin-top:15px;display:none;font-weight:bold;">Contraseña incorrecta</p>
    </div>
    <script>
        function checkPassword() {
            const pass = document.getElementById('site-password').value;
            if (pass === 'Diseno2025') {
                document.getElementById('password-overlay').style.display = 'none';
            } else {
                document.getElementById('password-error').style.display = 'block';
            }
        }
        
        // Permitir usar "Enter" para validar
        document.getElementById('site-password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
    <div id="ui-container">
        <!-- Panel Inferior Compacto -->
        <div class="glass-panel bottom-panel">
            <div class="info-row">
                <span id="size-label">20.0 cm x 20.0 cm</span>
                <select id="marker-size" class="compact-select">
                    <option value="20">Tracker: 20cm</option>
                    <option value="30">Tracker: 30cm</option>
                    <option value="10">Tracker: 10cm</option>
                </select>
            </div>
            
            <div class="control-row">
                <label for="scale-slider">Escala:</label>
                <input type="range" id="scale-slider" min="0.5" max="10" step="0.1" value="1">
            </div>
            
            <div class="control-row" style="margin-bottom: 4px;">
                <label for="example-logos">Logo:</label>
                <select id="example-logos" class="compact-select" style="flex: 1;">
                    <option value="">Subir archivo...</option>
                    <option value="assets/logos/01_Agra.svg">Agra</option>
                    <option value="assets/logos/02_Cavao toros.svg">Cavao toros</option>
                    <option value="assets/logos/03_Logo Fuego.svg">Logo Fuego</option>
                    <option value="assets/logos/04_Logo Jade solido.svg">Logo Jade sólido</option>
                    <option value="assets/logos/05_Kassette.png">Kassette</option>
                    <option value="assets/logos/06_Nativo.svg">Nativo</option>
                </select>
            </div>
            
            <div class="actions-row">
                <label for="logo-upload" class="icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Imagen
                </label>
                <input type="file" id="logo-upload" accept="image/png, image/jpeg, image/jpg, image/webp">

                <select id="bg-remover" class="compact-select" style="flex: 1;">
                    <option value="none">Limpiar: No</option>
                    <option value="remove-white">Borrar Blanco</option>
                    <option value="remove-black">Borrar Negro</option>
                </select>

                <button id="screenshot-btn" class="icon-btn highlight">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    Foto
                </button>
            </div>
        </div>
    </div>

    <!-- Escena AR -->
    <!-- Nota: Coloca el archivo targets.mind generado en esta misma carpeta -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true, preserveDrawingBuffer: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <!-- Target tracker -->
        <a-entity mindar-image-target="targetIndex: 0">
            <!-- Contenedor del Logo -->
            <a-entity id="logo-wrapper" scale="1 1 1">
                <a-plane id="logo-plane" width="1" height="1" color="#4F46E5" position="0 0 0.1"></a-plane>
            </a-entity>

            <!-- Cotas de Medición (Dimension lines) -->
            <!-- Cota Ancho (Inferior) -->
            <a-entity id="cota-bottom-line" geometry="primitive: plane; height: 0.015; width: 1" material="color: #34D399; shader: flat" position="0 -0.55 0.11"></a-entity>
            <a-text id="cota-bottom-text" value="20 cm" color="#34D399" align="center" wrap-count="15" width="2" position="0 -0.65 0.12"></a-text>

            <!-- Cota Alto (Derecha) -->
            <a-entity id="cota-right-line" geometry="primitive: plane; width: 0.015; height: 1" material="color: #34D399; shader: flat" position="0.55 0 0.11"></a-entity>
            <a-text id="cota-right-text" value="20 cm" color="#34D399" align="center" wrap-count="15" width="2" position="0.65 0 0.12" rotation="0 0 -90"></a-text>
        </a-entity>
    </a-scene>

    <script src="app.js"></script>
</body>
</html>
